name: Provision Client Portal

on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: Customer client slug to provision
        required: true
        type: string
      run_id:
        description: Optional onboarding provisioning run id
        required: false
        type: string
  repository_dispatch:
    types:
      - provision-client-portal

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ZERNIO_WEBHOOK_SECRET: ${{ secrets.ZERNIO_WEBHOOK_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      N8N_BASE_URL: ${{ vars.N8N_BASE_URL || 'https://n8n.myautomationpartner.com' }}
      CLIENT_SLUG: ${{ github.event.inputs.client_slug || github.event.client_payload.client_slug }}
      RUN_ID: ${{ github.event.inputs.run_id || github.event.client_payload.run_id }}
    steps:
      - name: Checkout portal template
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provision portal
        run: |
          if [ -z "$CLIENT_SLUG" ]; then
            echo "Missing client_slug input." >&2
            exit 1
          fi

          if [ -n "$RUN_ID" ]; then
            npm run provision:client -- --client-slug "$CLIENT_SLUG" --run-id "$RUN_ID"
          else
            npm run provision:client -- --client-slug "$CLIENT_SLUG"
          fi
