name: Provision Client Portal

on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: Customer client slug to provision
        required: true
        type: string
      run_id:
        description: Optional onboarding provisioning run id
        required: false
        type: string
      dry_run:
        description: Validate the provisioning path without deploying or sending email
        required: false
        type: boolean
        default: false
      deployment_mode:
        description: Portal deployment mode
        required: false
        type: choice
        default: shared-path
        options:
          - shared-path
          - dedicated-domain
      deploy_shared_worker:
        description: Rebuild and deploy the shared path Worker
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types:
      - provision-client-portal

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CHATWOOT_BASE_URL: ${{ vars.CHATWOOT_BASE_URL || 'https://chatwoot.myautomationpartner.com' }}
      CHATWOOT_PLATFORM_API_ACCESS_TOKEN: ${{ secrets.CHATWOOT_PLATFORM_API_ACCESS_TOKEN }}
      CHATWOOT_API_ACCESS_TOKEN: ${{ secrets.CHATWOOT_API_ACCESS_TOKEN }}
      CHATWOOT_OPERATOR_USER_ID: ${{ vars.CHATWOOT_OPERATOR_USER_ID || '3' }}
      ZERNIO_WEBHOOK_SECRET: ${{ secrets.ZERNIO_WEBHOOK_SECRET }}
      ZERNIO_INBOX_SEND_WEBHOOK_URL: ${{ secrets.ZERNIO_INBOX_SEND_WEBHOOK_URL }}
      ZERNIO_INBOX_SEND_SECRET: ${{ secrets.ZERNIO_INBOX_SEND_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      N8N_BASE_URL: ${{ vars.N8N_BASE_URL || 'https://n8n.myautomationpartner.com' }}
      CLIENT_SLUG: ${{ github.event.inputs.client_slug || github.event.client_payload.client_slug }}
      RUN_ID: ${{ github.event.inputs.run_id || github.event.client_payload.run_id }}
      DRY_RUN: ${{ github.event.inputs.dry_run || github.event.client_payload.dry_run || 'false' }}
      DEPLOYMENT_MODE: ${{ github.event.inputs.deployment_mode || github.event.client_payload.deployment_mode || 'shared-path' }}
      DEPLOY_SHARED_WORKER: ${{ github.event.inputs.deploy_shared_worker || github.event.client_payload.deploy_shared_worker || 'false' }}
      MAP_SHARED_PORTAL_HOST: ${{ vars.MAP_SHARED_PORTAL_HOST || 'myautomationpartner.com' }}
      MAP_SHARED_PORTAL_PATH_PREFIX: ${{ vars.MAP_SHARED_PORTAL_PATH_PREFIX || 'portal' }}
      PORTAL_TEMPLATE_REF: phase4-documents-share
    steps:
      - name: Checkout portal template
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PORTAL_TEMPLATE_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provision portal
        run: |
          if [ -z "$CLIENT_SLUG" ]; then
            echo "Missing client_slug input." >&2
            exit 1
          fi

          args=(--client-slug "$CLIENT_SLUG")

          if [ -n "$RUN_ID" ]; then
            args+=(--run-id "$RUN_ID")
          fi

          if [ "$DEPLOYMENT_MODE" = "dedicated-domain" ]; then
            args+=(--dedicated-domain)
          else
            args+=(--shared-path)
          fi

          if [ "$DEPLOY_SHARED_WORKER" = "true" ]; then
            args+=(--deploy-shared-worker)
          fi

          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run --skip-webhook-config)
          fi

          npm run provision:client -- "${args[@]}"
