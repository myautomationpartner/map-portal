name: Rollback Portal

on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: Customer client slug to roll back
        required: true
        type: string
      version_id:
        description: Cloudflare Worker version ID to roll back to
        required: true
        type: string
  repository_dispatch:
    types:
      - rollback-portal

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLIENT_SLUG: ${{ github.event.inputs.client_slug || github.event.client_payload.client_slug }}
      VERSION_ID: ${{ github.event.inputs.version_id || github.event.client_payload.version_id }}
      PORTAL_TEMPLATE_REF: phase4-documents-share
    steps:
      - name: Checkout portal template
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PORTAL_TEMPLATE_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rollback selected portal
        run: |
          if [ -z "$CLIENT_SLUG" ]; then
            echo "Missing client_slug input." >&2
            exit 1
          fi

          if [ -z "$VERSION_ID" ]; then
            echo "Missing version_id input." >&2
            exit 1
          fi

          npm run rollback:portal -- --client-slug "$CLIENT_SLUG" --version-id "$VERSION_ID"
