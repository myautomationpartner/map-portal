<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>map-portal</title>
    <script>
      (function () {
        var canonicalHost = String('%VITE_PORTAL_CANONICAL_HOST%' || '').trim().toLowerCase()
        if (!canonicalHost) return

        var currentHost = String(window.location.hostname || '').trim().toLowerCase()
        var isTechnicalHost =
          currentHost.endsWith('.workers.dev') || currentHost.endsWith('.pages.dev')

        if (!isTechnicalHost || currentHost === canonicalHost) return
        if (window.location.pathname.startsWith('/api/')) return

        var nextUrl =
          'https://' +
          canonicalHost +
          window.location.pathname +
          window.location.search +
          window.location.hash

        window.location.replace(nextUrl)
      })()
    </script>
    <script>
      (function () {
        function showBootError(message) {
          var root = document.getElementById('root')
          if (root && root.childNodes.length > 0) return

          document.body.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#f8faff 0%,#eef4ff 52%,#f7f8ff 100%);font-family:system-ui,sans-serif;color:#1f275c;">' +
              '<div style="max-width:760px;width:100%;background:#fff;border:1px solid rgba(109,115,196,.18);border-radius:24px;box-shadow:0 20px 60px rgba(73,86,180,.14);padding:24px;">' +
                '<p style="margin:0 0 12px;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#8b94bd;">Portal Startup Error</p>' +
                '<pre style="margin:0;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.6;color:#1f275c;">' + String(message) + '</pre>' +
              '</div>' +
            '</div>'
        }

        window.addEventListener('error', function (event) {
          if (event && event.message) showBootError(event.message)
        })

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason
          var message = reason && reason.stack ? reason.stack : reason && reason.message ? reason.message : String(reason)
          showBootError(message)
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
